spring.application.name=backend

server.port=8080

# Supabase PostgreSQL Connection (Using Session Pooler - IPv4)
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?prepareThreshold=0&sslmode=require
spring.datasource.username=postgres.gzkohtgqtpbscczxuaaj
spring.datasource.password=TJHPE@B23UOM
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# Flyway Migration Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.ignore-migration-patterns=*:missing

# HikariCP Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.initialization-fail-timeout=-1

# Image Upload Configuration
app.base-url=http://localhost:5173
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Supabase Storage Integration
supabase.url=https://gzkohtgqtpbscczxuaaj.supabase.co
supabase.key=${SUPABASE_KEY:}
supabase.bucket=room-images
supabase.hotel-bucket=hotel-images
supabase.review-bucket=review-images
supabase.user-bucket=user-identifications

